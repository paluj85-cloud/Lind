# Lind — tmux configuration
set -g mouse on
set -g history-limit 50000

# ============================================================
# Префикс — Ctrl+\ (браузер не перехватывает, в отличие от F12)
# ============================================================
set -g prefix 'C-\'
unbind C-b
unbind C-a
bind 'C-\' send-prefix

# ============================================================
# tmux-resurrect: сохранение и восстановление сессий
# ============================================================
# Плагин должен быть установлен в /opt/lind/.tmux/plugins/tmux-resurrect
run-shell /opt/lind/.tmux/plugins/tmux-resurrect/resurrect.tmux

# Настройки resurrect
set -g @resurrect-save-bash-history 'off'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
