<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lind — Регистрация</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>⚜ Lind ⚜</h1>
        <p class="subtitle">Создание аккаунта</p>

        <div id="auth-error" class="error hidden"></div>

        <form id="register-form" class="auth-form">
            <label>
                <span>Логин</span>
                <input type="text" id="login" name="login" placeholder="Придумайте логин" autocomplete="username" required>
            </label>

            <label>
                <span>Пароль</span>
                <input type="password" id="password" name="password" placeholder="Пароль (мин. 4 символа)" autocomplete="new-password" required>
            </label>

            <label>
                <span>Подтверждение пароля</span>
                <input type="password" id="password-confirm" name="password-confirm" placeholder="Повторите пароль" autocomplete="new-password" required>
            </label>

            <button type="submit" class="btn-primary">Зарегистрироваться</button>
        </form>

        <p class="switch-link">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const errorEl = document.getElementById('auth-error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');

            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;

            if (!login || !password) {
                errorEl.textContent = 'Заполните все поля';
                errorEl.classList.remove('hidden');
                return;
            }

            if (password !== confirm) {
                errorEl.textContent = 'Пароли не совпадают';
                errorEl.classList.remove('hidden');
                return;
            }

            if (password.length < 4) {
                errorEl.textContent = 'Пароль должен быть не менее 4 символов';
                errorEl.classList.remove('hidden');
                return;
            }

            const btn = form.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Регистрация...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Ошибка регистрации');
                }

                // Auto-login after registration
                const loginRes = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password }),
                });

                const loginData = await loginRes.json();

                if (!loginRes.ok) {
                    // Registration succeeded but auto-login failed — redirect to login page
                    window.location.href = '/login';
                    return;
                }

                localStorage.setItem('lind_player_id', loginData.player_id);
                localStorage.setItem('lind_token', loginData.token);
                localStorage.setItem('lind_login', loginData.login);
                localStorage.removeItem('lind_session_id');

                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
            }
        });
    </script>
</body>
</html>
