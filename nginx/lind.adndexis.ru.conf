# Lind — Cline CLI Web Terminal
# Nginx server block for lind.adndexis.ru
# WebSocket proxy to ttyd (localhost:7681) with HTTP Basic Auth

server {
    listen 80;
    server_name lind.adndexis.ru;

    # WebSocket proxy for ttyd (mandatory — ttyd uses ws://)
    location /cline {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
