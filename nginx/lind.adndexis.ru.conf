# Lind — Cline CLI Web Terminal
# Nginx server block for lind.adndexis.ru
# WebSocket proxy to ttyd (localhost:7681) with HTTP Basic Auth

server {
    server_name lind.adndexis.ru;

    # WebSocket proxy for ttyd (mandatory — ttyd uses ws://)
    location /cline {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lind.adndexis.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lind.adndexis.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = lind.adndexis.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name lind.adndexis.ru;
    return 404; # managed by Certbot
}
