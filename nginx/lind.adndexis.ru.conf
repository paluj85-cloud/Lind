# Lind — Cline CLI Web Terminal + Backend proxy
# Nginx server block for lind.adndexis.ru
# WebSocket proxy to ttyd (localhost:7681) + FastAPI backend (localhost:8001)

upstream backend {
    server 127.0.0.1:8001;
}

server {
    server_name lind.adndexis.ru;

    # ===== Backend locations =====

    # WebSocket proxy for game chat
    # WebSocket — match /ws with or without trailing slash
    location /ws {
        rewrite ^/ws$ /ws break;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API proxy
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin panel proxy
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files proxy
    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ===== ttyd (Cline CLI) =====

    # WebSocket proxy for ttyd (mandatory — ttyd uses ws://)
    location /cline {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Root — proxy to backend (player chat), MUST be after /cline
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lind.adndexis.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lind.adndexis.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = lind.adndexis.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name lind.adndexis.ru;
    return 404; # managed by Certbot
}
